<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-labelledby="title desc">
  <title id="title">Annarbor Tennis Club Logo</title>
  <desc id="desc">A cute tennis-themed logo in University of Michigan colors.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00274c"/>
      <stop offset="100%" stop-color="#003d72"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00152a" flood-opacity="0.4"/>
    </filter>
  </defs>

  <circle cx="160" cy="160" r="150" fill="url(#bg)"/>
  <circle cx="160" cy="160" r="146" fill="none" stroke="#ffcb05" stroke-width="8"/>

  <path d="M80 86h36l30 46 30-46h36v146h-28V140l-36 54-36-54v92H80z" fill="#ffcb05" filter="url(#shadow)"/>

  <g transform="rotate(-18 235 240)">
    <ellipse cx="235" cy="240" rx="30" ry="43" fill="none" stroke="#ffcb05" stroke-width="7"/>
    <line x1="235" y1="282" x2="235" y2="310" stroke="#ffcb05" stroke-width="8" stroke-linecap="round"/>
    <line x1="226" y1="300" x2="244" y2="300" stroke="#ffcb05" stroke-width="6" stroke-linecap="round"/>
  </g>

  <circle cx="250" cy="104" r="20" fill="#9ce857" stroke="#f5ffe6" stroke-width="3"/>
  <path d="M232 100c8 7 28 7 36 0" fill="none" stroke="#f5ffe6" stroke-width="2"/>
  <path d="M232 108c8 7 28 7 36 0" fill="none" stroke="#f5ffe6" stroke-width="2"/>

  <text x="160" y="268" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="700">ANNARBOR TENNIS</text>
</svg>
